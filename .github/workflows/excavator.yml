name: Excavator

on:
  workflow_dispatch:
  schedule:
    # run every 4 hours
    - cron: '20 */4 * * *'

permissions:
  contents: write

jobs:
  excavate:
    name: Excavate
    runs-on: windows-latest
    timeout-minutes: 15
    env:
      DENO_DIR: C:\deno_cache
    steps:
      - name: Checkout
        uses: actions/checkout@main
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true
      - name: Install Deno dependencies
        run: deno install --config .\scripts\deno\deno.json --lock .\scripts\deno\deno.lock
      - name: Excavate
        uses: ScoopInstaller/GithubActions@main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_UPDATED: 1
